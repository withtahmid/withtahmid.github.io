<!DOCTYPE html>
<html lang="en">
<head>
    <style>
$on:#0069D9;
$off:#b1b1b1;
$slider: #fff;

* {
  font-family: "Lato"
}

h1 {
  text-decoration:underline;
}

.text-left {
  text-align:left;
}
.text-center {
  text-align:center;
}
.mlr-auto {
  display: inline-block;
  margin-right: auto;
  margin-left:auto;
}
.custom-checkbox-slider {
  position: relative;
  margin-right:40px;
  &:checked {
    &::before {
      transform:translateX(150%);
    }
    &::after {
      background: $on;
    }
  }
  &::after,
  &::before {
    content: '';
    top:-2px;
    left:-2px;
    position: absolute;
    transition: all 0.3s ease-in-out;
  }
  &::after {
    background: $off;
    width:50px;
    height:20px;
    border-radius:10px;
    outline: none;
  }
  &::before {
    width:18px;
    height:18px;
    left:1px;
    top:-1px;
    border-radius:50%;
    background: $slider;
    z-index:1;
    outline: none;
  }
}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input checked type="checkbox" class="custom-checkbox-slider"> 
</body>
</html>
