
<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <title>Watch Together</title>
</head>
<body>
<div style="width: 100%; margin: 2% 0;">
  <div class="video-container">
    <video id="myVideoPlayer" controls>
      <source src="" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</div>

<div style="width: 100%;overflow: hidden; padding-left: 3%;">
  <!-- <div style="display: inline-block ;"> -->
    <form class="compact-form" >
    <label id="statusLabel" >Not Connected</label>
    <div class="form-group">
      <label for="user">User:</label>
      <input type="text" id="user" name="user" required>
    </div>   

    <div class="form-group">
      <label for="topic">Topic:</label>
      <input type="text" id="topic" name="topic" value="test/topic" required>
    </div>

    <!-- Sources -->
    <div class="form-group sources">
      <label>Sources:</label>
      <div>
        <input type="radio" id="source_toggle_1" name="source_toggle" value="1" >
        <label for="source_1">Drive</label>
        <input type="text" id="source_1" name="source_1">
      </div>

      <div>
        <input type="radio" id="source_toggle_2" name="source_toggle" value="2" checked>
        <label for="source_2">Local</label>
        <input type="file" id="source_2" name="source_2">
      </div>
    </div>
    <!-- Sources -->
    <button type="submit" onclick="submitForm(event)">Connect</button>

    <div class="form-group">
      <label for="broadcast">Enter broadcast message:</label>
      <input type="text" id="broadcast" name="broadcast">
      <button type="button" onclick="logMessage()">Broadcast</button>
    </div>

  </form>
  <div id = "infobox" class="infobox">
      <div id="info"></div>
  </div>
   <div id = "connectionBox" class="connectionBox" >
     <div class='connectionInfo'style=" margin-top: 10px; border:0px solid transparent; ">
      <span class='connectionName'>Connections</span>
      <span class='connectionTime'>"Last Joining Time"</span></div>
  </div>
  <br>
</div>

  



  
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const videoPlayer = document.getElementById('myVideoPlayer');
    var statusLabel = document.getElementById("statusLabel");
    // Create an MQTT client instance
    let mqttClient;
    let topic = 'test/topic';
    let me = '';
    const ESP = 0.5;
    previous_time = -1;
    ignore_event = false;
    const set = new Set();
  

    function appendInfo(name, time, message, chat) {
      var infoDiv = document.createElement("div");
      infoDiv.className = "info";
      if (name === me && chat) {
        name = 'You'
        infoDiv.classList.add("meChat");
      }
      else if(name == me){
        name = 'You'
        infoDiv.classList.add("meEvent");
      }
      else if(chat){
        infoDiv.classList.add("chat");
      }
      var nameTime = document.createElement("p");
      nameTime.innerHTML = '<span class="name">' + name + '</span><span class="time">' + time + '</span>';
      infoDiv.appendChild(nameTime);
      var messagePara = document.createElement("p");
      messagePara.className = "message";
      messagePara.innerHTML = message;
      infoDiv.appendChild(messagePara);
      document.getElementById("info").appendChild(infoDiv);
      var infoBox = document.getElementById("infobox");
      infoBox.scrollTop = infoBox.scrollHeight;
    }
    function appendConnection(name) {
      ok ="<div class='connectionInfo'><span class='connectionName'>"+name+"</span><span class='connectionTime'>"+ NOW()+ "</span></div>";
      if(set.has(name)){
        var connection = document.getElementById(name);
        connection.innerHTML = ok;
        return;
      }
      set.add(name);
      const parent = document.getElementById('connectionBox');
      const subDiv = document.createElement("div");
      subDiv.setAttribute("id", name);
      
      subDiv.innerHTML =  ok;
      parent.appendChild(subDiv); 
    }

    function NOW(){
      const currentDate = new Date();
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' };
      const formattedDate = currentDate.toLocaleString('en-US', options);
      return formattedDate;
    }
    function addHistory(info) {
      var infoBox = document.getElementById("infoBox");
      var infoLine = document.createElement("p");
      infoLine.textContent = NOW() + " | " + info;
      infoBox.appendChild(infoLine);
      infoBox.scrollTop = infoBox.scrollHeight;
    }
    function formatDuration(duration) {
      var hours = Math.floor(duration / 3600);
      var minutes = Math.floor((duration % 3600) / 60);
      var seconds = duration % 60;

      var hoursStr = hours.toString().padStart(2, "0");
      var minutesStr = minutes.toString().padStart(2, "0");
      var secondsStr = seconds.toString().padStart(2, "0");

      return `${hoursStr}:${minutesStr}:${parseInt(secondsStr)}`;
    }

     function submitForm(event) {
        event.preventDefault();
        me = document.getElementById("user").value;
        topic = document.getElementById("topic").value;
        let source;
        const sourceToggle = document.querySelector('input[name="source_toggle"]:checked').value;
        if (sourceToggle === "2") {
          file = document.getElementById("source_2").files[0]
          const videoUrl = URL.createObjectURL(file);
          videoPlayer.src = videoUrl;
          source = videoUrl;
        }
        else {
          source = document.getElementById("source_1").value;
          if(source.includes("drive.google.com")){
            source = "https://drive.google.com/uc?export=download&id=" + source.split('/')[5];
            videoPlayer.src = source;
          }
        }
        console.log(`User: ${user}`);
        console.log(`Source: ${source}`);
        triggermqtt();
        
      }
      function triggermqtt(){
        mqttClient = mqtt.connect('wss://test.mosquitto.org:8081');
        mqttClient.subscribe(topic);
        mqttClient.on('message', function (topic, message) {

          ignore_event = true;
          payload = message.toString().split('&');
          
          info = payload[1]+"ed at "+ formatDuration(payload[2]);
          if(payload[1] == 'join'){
            appendConnection(payload[0]);
            ignore_event = false
            return;
          }
          if(payload[1] == 'chat'){
            appendInfo(payload[0], NOW(), payload[2], true);
            ignore_event = false
            return;
          }
          appendInfo(payload[0], NOW(), info, false);
          
          if(payload[0] == me || payload[1] == 'join' || payload[1] == 'chat'){
            ignore_event = false
            return;
          }
          console.log(payload);
          text = payload[1];
          console.log(text);

          if(text == 'play' && videoPlayer.paused){
            videoPlayer.currentTime = Number(payload[2]);
            videoPlayer.play();
            }
            else if(text == 'pause' && !videoPlayer.paused){
              videoPlayer.pause();
              videoPlayer.currentTime = Number(payload[2]);
            }
            else if(text == 'seek'){
              // videoPlayer.pause();
              videoPlayer.currentTime = Number(payload[2]);
              console.log("Recieved Seeking message");
            }
            setTimeout(() => {
              ignore_event = false;
            }, 500);
        });


        mqttClient.on('connect', () => {
          console.log('Connected to MQTT broker');
           statusLabel.textContent = "Connected as " + me + " on '"+ topic + "'' at " + NOW();
          statusLabel.style.color = "green";
          logConnectionEvent();
        });

        mqttClient.on('error', (error) => {
          console.error('Error:', error);
        });

        mqttClient.on('close', () => {
          console.log('Disconnected from MQTT broker');
          statusLabel.textContent = "Disconnected";
          statusLabel.style.color = "red";
          // Attempt to reconnect after a delay
          setTimeout(() => {
            mqttClient.connect();
          }, 5000);
        });
      }
    function publishMessage(payload){
      mqttClient.publish(topic, payload);
      setTimeout(function(){}, 1000);
    } 
    var play = function(){logVideoEvent('play', videoPlayer.currentTime);}
    var pause = function(){logVideoEvent('pause', videoPlayer.currentTime);}
    var seeked = function(){logVideoEvent('seek', videoPlayer.currentTime);}
    function changeTime(time) {
      videoPlayer.currentTime = time;    
    }
    videoPlayer.addEventListener('play', play);
    videoPlayer.addEventListener('pause', pause);
    videoPlayer.addEventListener('seeked', seeked);
    function logVideoEvent(event, time) {
      console.log(ignore_event);
      if(ignore_event){
        return;
      }
      payload = me + '&' + event + '&' + time.toString();
      publishMessage(payload);
      console.log(payload);
    }
    function logMessage() {
      const message = document.getElementById("broadcast").value;
      payload = me+'&chat&'+message;
      console.log(payload);
      publishMessage(payload);

    }
    function logConnectionEvent(){
       payload = me + '&join&'+ videoPlayer.currentTime.toString();
      publishMessage(payload);
      console.log(payload);
    }
    function reconnect(){
       setTimeout(() => {
        mqttClient.connect();
      }, 5000);
    }
  </script>
</body>
</html>
