<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root{
        --yellow-primary: rgba(255,200,48, 1);
        --yellow-primary-half: rgba(255,200,48, 0.5);
        --yellow-background: rgba(46,44,37,1);
        --yellow-background-half: rgba(46,44,37, 0.3);

        }
        body{
            background-color: #333;
        }
        .container{
            margin-top: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* border: 1px solid red; */
            flex-grow: 1;
            min-height: 100%;
            gap: 1rem;
        }
        a, a::before, a:active, a::after{
            color: rgba(255,200,48, 1);
        }
        p{
            color: #ccc;
            font-size: xx-large;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            letter-spacing: 1px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

    </style>
    <title>Milkyway</title>
</head>
<body>
   <div class="container">
        <p>Milkyway is relocated to <a href="https://withtahmid.github.io/milkyway"> https://withtahmid.github.io/milkyway </a></p>
        <p>Redirecting in <span id="countdown">10</span> <span style="font-size: medium;color: rgba(255,200,48, 1);"> (or click the URL above)</span> </p>
   </div>
</body>
<script>
    const redirectUrl = 'https://withtahmid.github.io/milkyway';

    let countdownTime = 10;

    function updateCountdown() {
        const countdownElement = document.getElementById('countdown');
        countdownElement.textContent = countdownTime;
        countdownTime--;
        if (countdownTime < 0) {
            window.location.href = redirectUrl;
        } else {
            setTimeout(updateCountdown, 1000);
        }
    }
    window.onload = updateCountdown;

</script>
</html>
