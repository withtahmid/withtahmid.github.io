<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta property="og:image" content="images/milkyway.jpg">
	<meta property="og:image:secure_url" content="images/milkyway.jpg">
	<meta property="og:image:width" content="1920">
	<meta property="og:image:height" content="1080">
	<link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Megrim" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/connection.css">
	<link rel="stylesheet" href="css/videoPlayer.css">
	<link rel="stylesheet" href="css/chatbox.css">
	<link rel="icon" href="icons/video-icon.png" type="image/x-icon">
	<link rel="shortcut icon" href="icons/video-icon.png" type="image/x-icon">
	<title>MILKYWAY</title>
</head>
<body>
	<header>
		<img class="rotateicon" src="icons/video-icon.png" height="30px" width="30px" alt="Icon">
		<p>MILKYWAY</p>
		<button id="dropdown-toggle" class="nav-right-btn" onclick="toggleDropdown('dropworn')" ><i class="fas fa-bars"></i></button>
		<ul class="dropdown-menu hide-dropdown" id="dropworn">
			<li>User Guide</li>
			<li>About Creator</li>
		</ul>

	</header>
	<!-- pop ups -->
	<div class="alertcontainer center" id="alert-box">
		<div class="alert-box center">
			<div id="alertContent" class="alert-content center"></div>
			<button onclick="hideAlert()" type="button" class="btn-hover-fx"><i  class="fas fa-times"></i></button>
		</div>
	</div>

	<div id="notificationpopup" class="notificationpopup hide">
		<button onclick="hideNotification()" type="button" class="btn-hover-fx"><i  class="fas fa-times"></i></button>
		<div id="notificationContent" class="notification">
		</div>
	</div>
	<div id="popupdiv" class="popupdiv zero-height">
		<div id="popupcontentDiv" class="popupcontent center"></div>
		<div class="center" id="popupControl">
			<input id='subtitleTolRange' type='range' min='0' max='30' step='1' value='10'>
		</div>
		<div  class="popuptop center">
			<button class="btn-hover-fx" onclick="hidepopup()">Hide</button>
		</div>
	</div>

	<!-- Box - 1 -->
	<div class="box" >
		<div class="box-element box-1 inactive" id="videoContainer">
			<video id="videoPlayer" data-yt2html5="" controls>
              <source id="videoSource" src=""  type="video/mp4">
              <track id="subtitlesTrack" kind="captions" srclang="en" label="English" default>
              Your browser does not support the video tag.
            </video>
            <div class="below-video">
            	<input id = "skipValue" type="range" min="1" max="59" value="5">
            	<button class="btn-hover-fx" id = 'backward-btn' onclick="backward()"class="arrow-button">
            		<i class='fas fa-arrow-left'></i>
            		<span id = 'backward-btn-txt' > 5s</span>
            	</button>
            	<button id = 'forward-btn' onclick="forward()"class="btn-hover-fx">
            		<span id = 'forward-btn-txt' >5s </span>
            		<i class="fas fa-arrow-right"></i>
            	</button>
            </div>
		</div>
	</div>


	<!-- Box - 2 -->
	<div class="box">
		<div class="box-element box-2">
			<div class="playFrom">
				<span>
					<button id="src-option-button"class="src-choose btn-hover-fx" type="button" onclick="src_option_clicked()">Select Source</button>
				</span>
				<span id ="source-options" class="source-options">
					<button title="Play local file" onclick="selectSource('src-local')" id="src-local" class="src-btn btn-hover-fx src-local src-zero-width" type="button">
						<i class="fas fa-desktop bounceable"></i>
					</button>
					<button title="Play from Google Drive" onclick="selectSource('src-drive')" id="src-drive" class="src-btn btn-hover-fx src-drive src-zero-width" type="button">
						<i class="fab fa-google-drive bounceable"></i>
					</button>
					<button title="Play YouTube video" onclick="selectSource('src-youtube')" id="src-youtube" class="src-btn btn-hover-fx src-youtube src-zero-width" type="button">
						<i class="fab fa-youtube bounceable"></i>
					</button>
				</span>
			</div>
			<div class="videoFileInput">
				<div id="videoFileInputdiv"  class="file-input hidden">
					<input id="videoFileInput" type="file" class="file-input">
			    	<label for="videoFileInput" id="videoFileInputLabel" class="file-input-label  btn-hover-fx src-local">  <i class="fas fa-file-video"></i> Open Video</label>
			    	
			    </div>
			    <div class="file-input hidden" id="driveLinkInputField">
			    	<label onclick="driveLinkInputClipboard()" class="file-input-label btn-hover-fx src-drive"><i class="fas fa-clipboard"></i> Link</label>
			    	 OR
 			    	<input placeholder="G-Drive link" type="text" id="driveTextInputField">
			    	<button onclick="playFromDriveClick()" class="src-drive btn-hover-fx"><i class="fas fa-play"></i></button>	
			    </div>
			    <div class="file-input hidden" id="youtubeLabel">
			    	<label onclick="youtubeLinkInputClipboard()" class="file-input-label btn-hover-fx src-youtube"><i class="fas fa-clipboard"></i> Link</label>
			    	 OR 
 			    	<input placeholder="YouTube link" type="text" id="youtubeTextInputField">
			    	<button onclick="playFromYoutubeClick()" class="src-youtube btn-hover-fx"><i class="fas fa-play"></i></button>
			    	<br>
			    	<!-- <button class="src-youtube btn-hover-fx">Quality</button> -->
	            	<button onclick="ChangeYoutubeQuality('1080p')" class="src-youtube btn-hover-fx inactive" disabled>1080</button>
	            	<button onclick="ChangeYoutubeQuality('720p')" class="src-youtube btn-hover-fx">720p</button>
	            	<button onclick="ChangeYoutubeQuality('360p')" class="src-youtube btn-hover-fx">360p</button>

			    </div>
			   
			    <div id="subtitleBox" class="subtitle-box inactive">
					<input id="subtitleFileInput" type="file" class="file-input">
			    	<label title="Add subtile file" for="subtitleFileInput" id="subtitleFileInputLabel" class="default file-input-label  btn-hover-fx"><i class="fas fa-closed-captioning"></i> Subtitle</label>
			    	<button id="showSubBtn" class="default inactive btn-hover-fx" onclick="showSubtitle()">Show subtile</button>

			    	<div class="gap">
				    	<button onclick="createAncore()" class="default btn-hover-fx"><i class="fas fa-anchor"></i> Ancore</button>
				    	<button id="releaseAncore" onclick="playFromAncore()" class="default btn-hover-fx">00:00:0</button>
			    	</div>
				</div>


			</div>
			<div class="mediaNames">
		    	<label class="btn-hover-fx" id="videoFileNameLabel"></label>
		    	<br><br><br>
		    	<label class="btn-hover-fx" id="subtitleFileNameLabel"></label>
			</div>
		</div>
	</div>

	<!-- Box - 3 -->
	<div class="box">
		<div class="box-element box-3" >
			<div class="message-box" id="messageContainer">
				<!-- Messages appear here -->
			</div>
			<div class="below-message center  inactive" id="message-box">
				<input id="chatInput" placeholder="Send a message to everyone" type="text">
				<button class="btn-hover-fx" onclick="sendMessage()" type="button">Send</button>
			</div>
		</div>
	</div>

	<!-- Box - 4 -->
	<div class="box">
		<div class="box-element box-4">
			<div id ="connedtion-status" class = "connedtion-status zero-width"></div>
			
			<div id = "connectionInputField" class="inputField full-height-10">
				<span><input id = "usernameInputField" type="text" placeholder="Username"></span>
				<span><input id ="roomnameInputField" type="text" placeholder="Room"></span>
				<span><button title="Text to show on hover" class="sync" id = "connectButton" onclick="connect()" type="button">Join</button></span>
			</div>
			<div class="room-info inactive" id="room-info">
				<button id = "connection-username" class="room"><i class="fas fa-globe rotate-globe"></i> Username</button>
				<button id = "connection-roomname">Room Name</button>
			</div>
			<div id = "connectionSettings" class="connectionSettings inactive">
				<button class="btn-hover-fx" id = "connection-disconnect" onclick="disconnectConnection()" ><i class="fas fa-sign-out-alt"></i> Leave</button>
				<button class="btn-hover-fx" id = "connection-Activity" onclick="showActivityList()"><i class="fas fa-history"></i> Logs</button>
				<button class="btn-hover-fx" id = "connection-sync" onclick="toggleSync()">Sync <i class="sync-icon fas fa-sync-alt"></i></button>
				<button id="notificationVolumeButton" onclick="changeNotificationVolume()" title="Notification volume" type="button" class="btn-hover-fx"><i class="fas fa-volume-up"></i> 100%</button>
				<!-- <inpubut id = "connection-volume"type="range" min="0" max="1" step="0.01" value="1"> -->

			</div>
			<div id ="connectedPeopleList" class="connectedPeople inactive">
				<div class="eachPeople heading">
					<span>People</span>
					<span>Status</span>
					<span>Media</span>
				</div>
				<div id ="peopleRefreshList"></div>
			</div>
		</div>
	</div>
	<audio style="display:none; z-index: -1;" id="notification-sound" src="Audio/notification.mp3"></audio>
</body>
<footer>
	<p>The development and maintenance of the application are undertaken by <i class="fab fa-github"></i> <a href="https://github.com/withtahmid" target="_blank">withtahmid</a>.</p>
</footer>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
<script src="js/variables.js"></script>
<script src="js/adjustratio.js" ></script>
<script src="js/videoPlayer.js"></script>
<script src="js/functions.js"></script>
<script src="js/connection.js"></script>
<script src="js/declearations.js"></script>
<script src="js/youtube.js"></script>
<!-- <script src="https://cdn.jsdelivr.net/gh/thelevicole/youtube-to-html5-loader@4.0.1/dist/YouTubeToHtml5.js"></script> -->
</html>
