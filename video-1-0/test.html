<!DOCTYPE html>
<html>
<head>
  <title>Speaker Icons Example</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .icon-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .icon-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="icon-container">
    <div class="icon-box">
      <i class="fas fa-speaker fa-3x"></i>
      <span>Speaker</span>
    </div>

    <div class="icon-box">
      <i class="fas fa-speaker-slash fa-3x"></i>
      <span>Speaker with Slash</span>
    </div>

    <div class="icon-box">
      <i class="fas fa-speaker-volume fa-3x"></i>
      <span>Speaker Volume</span>
    </div>

    <div class="icon-box">
      <i class="fas fa-speaker-volume-slash fa-3x"></i>
      <span>Speaker Volume with Slash</span>
    </div>
  </div>
</body>
</html>
